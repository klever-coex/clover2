version: '3'

env:
  REGISTRY: "localhost:5000/"
  PROJECT_DIR: "{{.TASKFILE_DIR}}"
  VERSION:
    sh: cat "${PROJECT_DIR}/VERSION"
  GIT_COMMIT:
    sh: git rev-parse --short HEAD

tasks:
  build-docker-bake:
    cmds:
      - docker buildx bake {{.GROUP}}

  build-image-clover2:
    cmds:
      - ${PROJECT_DIR}/tooling/builder/builder.py --sudo --output ${PROJECT_DIR}/build-clover2-image/clover2-${GIT_COMMIT}.img

  clean:
    cmds:
      - rm -rf ${PROJECT_DIR}/build-*-image ${PROJECT_DIR}/docs/build
