stages:
  - docker-build

.docker-setup: &docker-task
  image: docker:latest
  services:
    - docker:dind

.trigger-master: &trigger-master
  rules:
    - if: $CI_COMMIT_TAG =~ /^master$/

.trigger-merge-request: &trigger-merge-request
  only:
    - merge_request

.docker-bake: &docker-bake
  <<: *docker-task
  stage: docker-build
  script:
    - task build-docker-bake

docker-bake-latest:
  <<: *trigger-master
  <<: *docker-bake

docker-bake-tagged:
  <<: *trigger-merge-request
  <<: *docker-bake
