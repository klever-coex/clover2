stages:
  - docker-build

.docker-setup: &docker-task
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u "$DOCKER_REGISTRY_USER" -p "$DOCKER_REGISTRY_PASSWORD" registry.gitlab.com

.trigger-master: &trigger-master
  rules:
    - if: $CI_COMMIT_TAG =~ /^master$/

.trigger-merge-request: &trigger-merge-request
  only:
    - merge_request

.docker-web: &docker-web
  <<: *docker-task
  stage: docker-build
  script:
    - task build-docker-bake GROUP=$BAKE_GROUP

docker-web-master:
  <<: *trigger-master
  <<: *docker-web
  variables:
    BAKE_GROUP: "web"

docker-web-mr:
  <<: *trigger-merge-request
  <<: *docker-web
  variables:
    BAKE_GROUP: "web-dev"
