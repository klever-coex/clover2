stages:
  - docker

.docker-setup: &docker-task
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - echo "$DOCKER_REGISTRY_PASSWORD" | docker login registry.gitlab.com --username $DOCKER_REGISTRY_USER --password-stdin

.trigger-master: &trigger-master
  rules:
    - if: $CI_COMMIT_TAG =~ /^master$/

.trigger-mr: &trigger-merge-request
  only:
    - merge_request

.docker-bake: &docker-bake
  <<: *docker-task
  stage: docker
  script:
    - task clover2-docker-bake GROUP=$BAKE_GROUP

docker-web-master:
  <<: *trigger-master
  <<: *docker-bake
  variables:
    BAKE_GROUP: "web"

docker-web-mr:
  <<: *trigger-merge-request
  <<: *docker-bake
  variables:
    BAKE_GROUP: "web-dev"

docker-tolling-master:
  <<: *trigger-master
  <<: *docker-bake
  variables:
    BAKE_GROUP: "tolling"

docker-tooling-mr:
  <<: *trigger-merge-request
  <<: *docker-bake
  variables:
    BAKE_GROUP: "tooling-dev"
