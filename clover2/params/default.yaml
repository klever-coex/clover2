    Brightness: 0.0
    Contrast: 1.2
    ExposureTime: 1500
    ExposureTimeMode: 1
    format: "RGB888"
    frame_id: "main_camera_link"
    height: 480
    StatsOutputEnable: false
    width: 640

/**/main_camera_aruco_detector:
  ros__parameters:
    marker_dict: "4X4_250"
    prefix_frame_id: "aruco_"
    tf_publish: true

/**/web_video_server:
  ros__parameters:
    port: 8081
