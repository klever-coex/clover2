    use_intra_process_comms: true

/**/map_server:
  ros__parameters:

/**/aruco_tracker:
  ros__parameters:
    tracking: "base_link"
    optimizer: "simple_mean"
    graph_linearizer:
      history_sec: 1.0
    simple_mean:
      history_sec: 0.2

/**/main_camera_of:
  ros__parameters:
    roi: 256

/**/main_camera:
  ros__parameters:
    camera: "/base/axi/pcie@120000/rp1/i2c@88000/imx219@10"
