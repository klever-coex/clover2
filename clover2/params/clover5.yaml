/**:
  ros__parameters:
    use_intra_process_comms: true

/**/aruco_tracker:
  ros__parameters:
    tracking: "base_link"

/**/fcu_bridge:
  ros__parameters:
    backend: "mavros"
    speed_limit: 1.0
    tolerance: 0.15
    slowdown_distance: 0.5

/**/main_camera/camera:
  ros__parameters:
    camera: 0
    width: 640
    height: 480
    format: "RGB888"
    ExposureTime: 1500
    ExposureTimeMode: 1
    FrameDurationLimits: [33333, 33333]
    HdrMode: 0

/**/front_camera/camera:
  ros__parameters:
    camera: 1
    width: 640
    height: 480
    format: "RGB888"
    ExposureTime: 1500
    ExposureTimeMode: 1
    FrameDurationLimits: [33333, 33333]
    HdrMode: 0

