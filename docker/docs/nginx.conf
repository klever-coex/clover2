events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;

    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        application/xml
        image/svg+xml;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;

        location = / {
            return 301 /ru/;
        }

        location ~* \.(js|css|webp|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
            expires 1y;
        }

        location /ru/ {
            try_files $uri $uri/ /ru/index.html;
        }

        location /en/ {
            try_files $uri $uri/ /en/index.html;
        }

        location ~* index\.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires -1;
        }
    }
}
