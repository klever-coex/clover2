repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.3.0
    hooks:
      - id: check-yaml
        files: \.yaml$
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/cpp-linter/cpp-linter-hooks
    rev: v1.1.8
    hooks:
      - id: clang-format
        args: [--style=file, --version=21]
