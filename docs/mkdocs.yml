site_name: My Documentation
site_url: http://127.0.0.1/
site_description: Comprehensive documentation with multi-language support

theme:
  name: material
  language: ru
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
      primary: indigo
      accent: indigo

    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
      primary: indigo
      accent: indigo

  font:
    text: Roboto
    code: Roboto Mono
  icon:
    logo: material/book-open

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.tooltips
    - content.code.annotate
    - content.code.copy
    - navigation.top

extra:
  alternate:
    - name: English
      link: /en/
      lang: en
    - name: Русский
      link: /ru/
      lang: ru
    - name: English
      link: /
      lang: en

plugins:
  - search
  - i18n:
      default_language: ru
      languages:
        en: English
        ru: Русский

nav:
  - Home: index.md
  - Guide:
    - Installation: guide/installation.md
    - Configuration: guide/configuration.md

extra:
  search:
    language: 'en'

copyright: |
  &copy; 2025 - <a href="/en/">English</a> | <a href="/ru/">Русский</a>

repo_url: https://github.com/yourusername/your-repo
repo_name: clover5

social:
  - icon: fontawesome/brands/telegram
    link: https://t.me/l_motya