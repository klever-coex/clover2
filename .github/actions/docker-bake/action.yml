name: Docker Bake
description: Build and push a Docker bake target

inputs:
  target:
    description: Bake target name (e.g. px4, ros, tooling, clover2-docs)
    required: true

runs:
  using: composite
  steps:
    - name: Build and push ${{ inputs.target }}
      shell: bash
      run: make clover2-bake-push-${{ inputs.target }}
